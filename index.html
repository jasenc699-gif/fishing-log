<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fishing Log</title>

<style>
body { font-family: Arial; margin:0; }
.header { background:#111; color:#fff; padding:10px; text-align:center; }
.tab { display:none; padding:10px; }
.tab.active { display:block; }
.card { border:1px solid #ddd; padding:10px; margin-top:10px; }
nav { position:fixed; bottom:0; width:100%; display:flex; }
nav button { flex:1; padding:10px; }
</style>
</head>

<body>

<header class="header">
  <h1>Fishing Log</h1>
</header>

<main>

<section id="log" class="tab active">
  <input id="species" placeholder="Species">
  <input id="length" placeholder="Length (cm)">
  <input id="weight" placeholder="Weight (kg)">

  <input type="file" id="photo" accept="image/*">
  <img id="preview" style="width:100%; margin-top:10px;">

  <button id="saveBtn">Save Catch</button>

  <div id="catchList"></div>
</section>

<section id="stats" class="tab">
  <div>Total Catches: <span id="statTotal"></span></div>
  <div>Last Catch: <span id="statLast"></span></div>
</section>

</main>

<nav>
  <button data-tab="log">Log</button>
  <button data-tab="stats">Stats</button>
</nav>

<script>
const ImageTools = {
  async compress(file, maxWidth = 1024, quality = 0.7) {
    return new Promise(resolve => {
      const reader = new FileReader();
      const img = new Image();

      reader.onload = e => img.src = e.target.result;

      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = maxWidth / img.width;

        canvas.width = maxWidth;
        canvas.height = img.height * scale;

        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        canvas.toBlob(blob => resolve(blob), 'image/jpeg', quality);
      };

      reader.readAsDataURL(file);
    });
  }
};

const Storage = (() => {
  let db;
  const request = indexedDB.open('FishingDB', 1);

  request.onupgradeneeded = e => {
    db = e.target.result;
    db.createObjectStore('catches', { keyPath:'id', autoIncrement:true });
  };

  request.onsuccess = e => db = e.target.result;

  function save(data) {
    return new Promise(resolve => {
      const tx = db.transaction('catches','readwrite');
      tx.objectStore('catches').add(data);
      tx.oncomplete = resolve;
    });
  }

  function getAll() {
    return new Promise(resolve => {
      const tx = db.transaction('catches','readonly');
      const req = tx.objectStore('catches').getAll();
      req.onsuccess = () => resolve(req.result);
    });
  }

  return { save, getAll };
})();

const UI = {
  getFormData() {
    return {
      species: species.value,
      length: length.value,
      weight: weight.value
    };
  },

  render(catches) {
    catchList.innerHTML = '';
    catches.forEach(c => {
      const el = document.createElement('div');
      el.className = 'card';
      el.innerHTML = `<h3>${c.species}</h3><p>${c.length} cm</p>`;
      catchList.appendChild(el);
    });
  },

  preview(blob) {
    preview.src = URL.createObjectURL(blob);
  },

  reset() {
    preview.src = '';
  },

  tab(id) {
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }
};

const Stats = {
  async init() {
    const data = await Storage.getAll();
    this.render(data);
  },

  render(catches) {
    statTotal.innerText = catches.length;

    if (catches.length > 0) {
      const last = catches[catches.length - 1];
      statLast.innerText = `${last.species} (${last.length} cm)`;
    } else {
      statLast.innerText = '-';
    }
  }
};

let tempImage = null;

document.addEventListener('DOMContentLoaded', () => {

  document.querySelectorAll('[data-tab]').forEach(btn=>{
    btn.onclick = () => {
      UI.tab(btn.dataset.tab);
      if(btn.dataset.tab==='stats') Stats.init();
    };
  });

  photo.onchange = async e=>{
    const file = e.target.files[0];
    if(!file) return;

    tempImage = await ImageTools.compress(file);
    UI.preview(tempImage);
  };

  saveBtn.onclick = async ()=>{
    const data = UI.getFormData();
    data.photo = tempImage;
    data.date = new Date().toISOString();

    await Storage.save(data);

    const all = await Storage.getAll();
    UI.render(all);

    UI.reset();
    tempImage = null;
  };

  Storage.getAll().then(UI.render);

});
</script>

</body>
</html>
