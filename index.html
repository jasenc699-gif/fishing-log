<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fishing Log Pro</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    :root { --primary: #4fc3a1; --bg: #f4f4f2; --card: #ffffff; --text: #333; --accent: #3498db; --danger: #e74c3c; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; color: var(--text); }
    
    .header { background: #2c2c2c; color: white; padding: 15px; text-align: center; font-weight: bold; }
    .nav { display: flex; background: #383838; position: sticky; top: 0; z-index: 2000; }
    .nav-btn { flex: 1; padding: 15px 5px; color: #999; border: none; background: none; font-size: 11px; text-transform: uppercase; cursor: pointer; }
    .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .section { display: none; padding: 15px; }
    .section.active { display: block; }

    .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 8px; color: #888; text-transform: uppercase; border-bottom: 1px solid #eee; padding-bottom: 4px; }
    
    .env-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
    .env-item { background: #f9f9f9; padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #eee; }
    .env-val { font-size: 14px; font-weight: bold; display: block; }
    .env-lab { font-size: 9px; color: #999; text-transform: uppercase; }

    #map, #big-map { height: 300px; border-radius: 12px; width: 100%; margin-bottom: 15px; background: #ddd; z-index: 1; }
    
    .manage-row { display: flex; gap: 5px; margin-bottom: 10px; }
    .manage-row input { flex: 1; margin-bottom: 0; padding: 10px; border-radius: 8px; border: 1px solid #ddd; }
    .btn-add { background: var(--primary); color: white; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; font-size: 20px; }

    .pill-box { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; }
    .pill { background: #eee; padding: 6px 12px; border-radius: 15px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; display: flex; align-items: center; }
    .pill.active { background: var(--primary); color: white; border-color: var(--primary); }
    .pill .del { margin-left: 8px; opacity: 0.4; font-weight: bold; font-size: 14px; }

    input[type="number"], textarea { width: 100%; padding: 12px; margin-bottom: 12px; border: 1px solid #eee; border-radius: 8px; font-size: 16px; }
    .btn-main { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; border-radius: 10px; font-weight: bold; font-size: 16px; }
    
    .catch-card { background: white; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #eee; position: relative; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; color: white; font-weight: bold; margin-right: 5px; }
    .del-catch { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; border-radius: 5px; padding: 5px; font-size: 10px; z-index: 5; }
</style>
</head>
<body>

<div class="header">FISHING LOG PRO</div>

<div class="nav">
    <button class="nav-btn active" onclick="showTab('log', this)">Log</button>
    <button class="nav-btn" onclick="showTab('map-tab', this)">History Map</button>
    <button class="nav-btn" onclick="showTab('catches', this)">Catches</button>
</div>

<div id="log" class="section active">
    <div class="card">
        <label>📍 1. Set Location</label>
        <div id="map"></div>
        <input type="text" id="f-loc-name" style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee; margin-bottom:15px;" placeholder="Location Name">

        <label>🌊 2. Conditions at this Spot</label>
        <div class="env-grid">
            <div class="env-item"><span id="live-weather" class="env-val">--</span><span class="env-lab">Weather</span></div>
            <div class="env-item"><span id="live-tide" class="env-val">--</span><span class="env-lab">Tide</span></div>
            <div class="env-item"><span id="live-bite" class="env-val">--</span><span class="env-lab">Bite Rating</span></div>
            <div class="env-item"><span id="live-time" class="env-val">--</span><span class="env-lab">Local Time</span></div>
        </div>

        <label>🐟 3. Species</label>
        <div class="manage-row">
            <input type="text" id="new-species" placeholder="Add custom fish...">
            <button class="btn-add" onclick="addToLib('species')">+</button>
        </div>
        <div id="species-lib" class="pill-box"></div>
        
        <label>🎣 4. Fly / Lure</label>
        <div class="manage-row">
            <input type="text" id="new-fly" placeholder="Add custom fly...">
            <button class="btn-add" onclick="addToLib('fly')">+</button>
        </div>
        <div id="fly-lib" class="pill-box"></div>

        <label>📸 5. Details</label>
        <input type="number" id="f-weight" step="0.1" placeholder="Weight (kg)">
        <textarea id="f-notes" placeholder="Notes..."></textarea>
        <input type="file" id="f-photo" accept="image/*" style="font-size: 12px; margin-bottom:15px;">
        
        <button class="btn-main" onclick="saveCatch()">SAVE CATCH RECORD</button>
    </div>
</div>

<div id="map-tab" class="section">
    <div class="card">
        <label>🗺️ History: Your Catch Pins</label>
        <div id="big-map"></div>
    </div>
</div>

<div id="catches" class="section"><div id="catch-list"></div></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, bigMap, marker, lat, lng, photoBase64 = "";
    let catches = JSON.parse(localStorage.getItem('catches') || '[]');
    let speciesLib = JSON.parse(localStorage.getItem('speciesLib') || '["Snapper", "Trout", "Kingfish"]');
    let flyLib = JSON.parse(localStorage.getItem('flyLib') || '["Clouser", "Woolly Bugger"]');
    let selSpecies = "", selFly = "";

    function showTab(id, btn) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        
        if(id === 'log') setTimeout(() => map.invalidateSize(), 200);
        if(id === 'map-tab') {
            setTimeout(() => {
                bigMap.invalidateSize();
                renderHistoryPins();
            }, 200);
        }
        if(id === 'catches') renderCatches();
    }

    // LIBRARY MANAGERS
    function renderLibs() {
        const sContainer = document.getElementById('species-lib');
        sContainer.innerHTML = speciesLib.map(s => `
            <div class="pill ${selSpecies === s ? 'active' : ''}" onclick="selectItem('species', '${s}')">
                ${s} <span class="del" onclick="removeFromLib(event, 'species', '${s}')">×</span>
            </div>
        `).join('');

        const fContainer = document.getElementById('fly-lib');
        fContainer.innerHTML = flyLib.map(f => `
            <div class="pill ${selFly === f ? 'active' : ''}" onclick="selectItem('fly', '${f}')">
                ${f} <span class="del" onclick="removeFromLib(event, 'fly', '${f}')">×</span>
            </div>
        `).join('');
    }

    function addToLib(type) {
        const input = document.getElementById('new-' + type);
        const val = input.value.trim();
        if(!val) return;
        if(type === 'species') speciesLib.push(val); else flyLib.push(val);
        localStorage.setItem(type + 'Lib', JSON.stringify(type === 'species' ? speciesLib : flyLib));
        input.value = "";
        renderLibs();
    }

    function removeFromLib(e, type, val) {
        e.stopPropagation();
        if(!confirm("Remove " + val + "?")) return;
        if(type === 'species') speciesLib = speciesLib.filter(x => x !== val);
        else flyLib = flyLib.filter(x => x !== val);
        localStorage.setItem(type + 'Lib', JSON.stringify(type === 'species' ? speciesLib : flyLib));
        renderLibs();
    }

    function selectItem(type, val) {
        if(type === 'species') selSpecies = val; else selFly = val;
        renderLibs();
    }

    // CONDITIONS ENGINE
    async function updateConditions(nLat, nLng) {
        lat = nLat; lng = nLng;
        try {
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`).then(r => r.json());
            document.getElementById('live-weather').innerText = Math.round(w.current_weather.temperature) + "°C";
        } catch(e) { document.getElementById('live-weather').innerText = "--°C"; }

        const hr = new Date().getHours();
        const tide = (hr % 12 < 6) ? "Incoming" : "Outgoing";
        document.getElementById('live-tide').innerText = tide;
        document.getElementById('live-bite').innerText = (tide === "Incoming" || hr < 9 || hr > 17) ? "High" : "Average";
        document.getElementById('live-time').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

        try {
            const r = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`).then(res => res.json());
            document.getElementById('f-loc-name').value = r.display_name.split(',')[0];
        } catch(e) {}
    }

    // MAP HISTORY
    function renderHistoryPins() {
        bigMap.eachLayer((layer) => { if (layer instanceof L.Marker) bigMap.removeLayer(layer); });
        if (catches.length === 0) return;
        catches.forEach(c => {
            if(c.lat && c.lng) {
                L.marker([c.lat, c.lng]).addTo(bigMap)
                 .bindPopup(`<b>${c.species}</b><br>${c.weight}kg<br>${c.date}`);
            }
        });
        const last = catches[catches.length - 1];
        bigMap.setView([last.lat, last.lng], 10);
    }

    function saveCatch() {
        if(!selSpecies) return alert("Please select a Species");
        const entry = {
            id: Date.now(),
            species: selSpecies,
            fly: selFly,
            weight: document.getElementById('f-weight').value || 0,
            notes: document.getElementById('f-notes').value,
            lat: lat, lng: lng,
            locName: document.getElementById('f-loc-name').value || "Spot",
            weather: document.getElementById('live-weather').innerText,
            tide: document.getElementById('live-tide').innerText,
            bite: document.getElementById('live-bite').innerText,
            date: new Date().toLocaleDateString(),
            photo: photoBase64
        };
        catches.push(entry);
        localStorage.setItem('catches', JSON.stringify(catches));
        alert("Catch Saved!");
        location.reload();
    }

    function deleteCatch(id) {
        if(!confirm("Delete this catch?")) return;
        catches = catches.filter(c => c.id !== id);
        localStorage.setItem('catches', JSON.stringify(catches));
        renderCatches();
    }

    function renderCatches() {
        document.getElementById('catch-list').innerHTML = catches.map(c => `
            <div class="catch-card">
                <button class="del-catch" onclick="deleteCatch(${c.id})">DEL</button>
                ${c.photo ? `<img src="${c.photo}" style="width:100%">` : ''}
                <div style="padding:15px;">
                    <strong>${c.species} (${c.weight}kg)</strong>
                    <div style="margin: 8px 0;">
                        <span class="badge" style="background:#f39c12">${c.weather}</span>
                        <span class="badge" style="background:#3498db">${c.tide}</span>
                        <span class="badge" style="background:#e67e22">Bite: ${c.bite}</span>
                    </div>
                    <div style="font-size:11px; color:#666;">📍 ${c.locName} | 📅 ${c.date} | 🎣 ${c.fly || 'N/A'}</div>
                </div>
            </div>
        `).reverse().join('') || '<p style="text-align:center">No catches recorded.</p>';
    }

    window.onload = () => {
        renderLibs();
        map = L.map('map').setView([-37.68, 176.16], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([-37.68, 176.16], {draggable: true}).addTo(map);
        marker.on('dragend', () => updateConditions(marker.getLatLng().lat, marker.getLatLng().lng));

        bigMap = L.map('big-map').setView([-37.68, 176.16], 8);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(bigMap);

        navigator.geolocation.getCurrentPosition(p => {
            map.setView([p.coords.latitude, p.coords.longitude], 14);
            marker.setLatLng([p.coords.latitude, p.coords.longitude]);
            updateConditions(p.coords.latitude, p.coords.longitude);
        });

        document.getElementById('f-photo').addEventListener('change', function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => photoBase64 = ev.target.result;
            reader.readAsDataURL(e.target.files[0]);
        });
    };
</script>
</body>
</html>
