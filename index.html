<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NZ Fishing Log">
<meta name="theme-color" content="#2c2c2c">
<title>Fishing Log for NZ Waters</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/full.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --teal:#4fc3a1; --dark:#2c2c2c; --dark2:#383838; --dark3:#444; --text:#1a1a1a;
  --muted:#5a5a5a; --hint:#999; --border:#ddddd8; --surf:#ebebea; --surf2:#f4f4f2;
  --white:#ffffff; --grey-btn:#5a5a5a; --grey-btn-hover:#484848;
}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--dark);}
.app{max-width:430px;margin:0 auto;height:100vh;display:flex;flex-direction:column;background:var(--surf2);}
.header{background:var(--dark);padding:max(env(safe-area-inset-top),12px) 16px 11px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.htitle{font-size:18px;font-weight:700;color:#fff;letter-spacing:-0.3px;}
.hsub{font-size:11px;color:rgba(255,255,255,0.45);margin-top:1px;}
.tabs{display:flex;background:var(--dark2);overflow-x:auto;flex-shrink:0;border-top:0.5px solid rgba(255,255,255,0.08);padding-bottom:max(env(safe-area-inset-bottom),6px);}
.tab{flex:1;min-width:40px;display:flex;flex-direction:column;align-items:center;padding:8px 2px 5px;cursor:pointer;border-top:2px solid transparent;gap:3px;}
.tab.active{border-top-color:var(--teal);}
.ti{font-size:18px;line-height:1;}
.tl{font-size:7.5px;color:rgba(255,255,255,0.4);text-transform:uppercase;letter-spacing:0.3px;}
.tab.active .tl{color:var(--teal);}
.pages{flex:1;overflow:hidden;position:relative;}
.pg{position:absolute;inset:0;overflow-y:auto;padding:13px;display:none;-webkit-overflow-scrolling:touch;}
.pg.show{display:block;}
.sec{background:var(--white);border-radius:12px;border:0.5px solid var(--border);padding:13px;margin-bottom:10px;}
.stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.pu{width:100%;min-height:200px;border:1.5px dashed #ccc;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--surf);overflow:hidden;position:relative;}
.pu img{width:100%;height:100%;object-fit:contain;position:absolute;inset:0;}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;margin-top:10px;font-weight:500;}
input,select,textarea{width:100%;padding:10px 12px;border:0.5px solid #d0d0cc;border-radius:8px;font-size:16px;font-family:inherit;}
.r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.sbtn{width:100%;padding:14px;background:var(--grey-btn);border:none;border-radius:12px;font-size:16px;font-weight:600;color:#fff;cursor:pointer;}
.teal-btn{background:var(--teal)!important;}
.gpsbtn{margin-top:8px;width:100%;padding:10px;background:var(--surf);border:0.5px solid var(--border);border-radius:8px;font-size:14px;color:var(--muted);cursor:pointer;}
.mapbox{width:100%;height:210px;border-radius:10px;overflow:hidden;border:0.5px solid var(--border);margin-top:9px;}
.ccard{background:var(--white);border-radius:12px;border:0.5px solid var(--border);margin-bottom:10px;padding:12px;display:flex;gap:12px;align-items:center;}
.cbody{flex:1;}
.cfish{font-size:15px;font-weight:700;}
.cmeta{font-size:12px;color:var(--muted);}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:12px 24px;border-radius:30px;display:none;z-index:9999;}
</style>
</head>
<body>
<div class="app">
  <div id="toast"></div>

  <div class="header">
    <div>
      <div class="htitle">Fishing Log for NZ Waters</div>
      <div class="hsub" id="hcount">0 catches logged</div>
    </div>
  </div>

  <div class="pages">
    <div class="pg show" id="pg-log">
      <div class="sec">
        <div class="stitle">📸 Photo</div>
        <div class="pu" id="puEl" onclick="document.getElementById('fiLib').click();">
          <div id="puInner">Tap to add photo</div>
          <img id="prevImg" style="display:none">
        </div>
        <input type="file" id="fiLib" accept="image/*" onchange="handlePhoto(event)" style="display:none">
      </div>

      <div class="sec">
        <div class="stitle">🐟 Catch Details</div>
        <label>Species</label>
        <select id="ftype" onchange="toggleCustomSpecies()">
          <option value="Snapper">Snapper</option>
          <option value="Kingfish">Kingfish</option>
          <option value="Kahawai">Kahawai</option>
          <option value="Other">Other</option>
        </select>
        <div id="customGroup" style="display:none">
          <label>Specify Species</label>
          <input type="text" id="fcust">
        </div>
        <div
