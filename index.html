<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Fishing Log</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* CSS REFACTOR: BOTTOM TABS & LAYOUT */
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
        :root{
            --teal:#4fc3a1; --dark:#2c2c2c; --dark2:#383838; --text:#1a1a1a;
            --muted:#5a5a5a; --border:#ddddd8; --surf2:#f4f4f2; --white:#ffffff;
        }
        body{font-family:-apple-system,system-ui,sans-serif;background:var(--dark);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
        
        /* Fixed Header */
        .header{background:var(--dark);padding:max(env(safe-area-inset-top),12px) 16px 11px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
        .htitle{font-size:18px;font-weight:700;color:#fff;}
        .hsub{font-size:11px;color:rgba(255,255,255,0.45);}

        /* Main Content Area */
        .app{flex:1;position:relative;background:var(--surf2);overflow:hidden;display:flex;flex-direction:column;}
        .pages{flex:1;overflow-y:auto;padding-bottom:80px; /* Space for bottom tabs */}
        .pg{display:none;padding:13px;}
        .pg.show{display:block;}

        /* BOTTOM TABS */
        .tabs{
            position:fixed;bottom:0;left:0;right:0;
            display:flex;background:var(--dark2);
            padding-bottom:env(safe-area-inset-bottom);
            border-top:0.5px solid rgba(255,255,255,0.1);
            z-index:1000;
        }
        .tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0;cursor:pointer;gap:4px;}
        .tab.active{background:rgba(79,195,161,0.1);border-top:2px solid var(--teal);}
        .ti{font-size:18px;}
        .tl{font-size:9px;color:rgba(255,255,255,0.5);text-transform:uppercase;font-weight:600;}
        .tab.active .tl{color:var(--teal);}

        /* Re-adding Missing Map/Location UI Elements */
        .sec{background:var(--white);border-radius:12px;border:0.5px solid var(--border);padding:13px;margin-bottom:10px;}
        .stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:10px;}
        .mapbox{width:100%;height:210px;border-radius:10px;overflow:hidden;border:0.5px solid var(--border);margin-top:9px;position:relative;}
        input, select{width:100%;padding:10px;border:0.5px solid #ccc;border-radius:8px;font-size:16px;margin-bottom:8px;}
        .r2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .gpsbtn{width:100%;padding:12px;background:var(--teal);color:white;border:none;border-radius:8px;font-weight:bold;margin-bottom:10px;}
        
        /* Sync Badges */
        .sync-indicator{font-size:10px;padding:2px 6px;border-radius:4px;float:right;}
        .status-cached{background:#eee;color:#666;}
        .status-live{background:var(--teal);color:white;}
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <div class="htitle">Fishing Log</div>
        <div class="hsub" id="hcount">0 catches logged</div>
    </div>

    <div class="pages">
        <div class="pg show" id="pg-log">
            <div class="sec">
                <div class="stitle">📍 Location Picker</div>
                <label>Search place</label>
                <input type="text" id="locname" placeholder="e.g. Tauranga Harbour">
                
                <div class="r2">
                    <input type="number" id="clat" step="0.0001" value="-37.6878">
                    <input type="number" id="clng" step="0.0001" value="176.1651">
                </div>
                
                <button class="gpsbtn" onclick="doGPS()">📡 Use My Current GPS</button>
                
                <div class="mapbox" id="logmap"></div>
                <p style="font-size:11px; color:var(--muted); margin-top:5px;">Drag pin to fine-tune location</p>
            </div>
            <button style="width:100%; padding:15px; background:var(--dark); color:white; border-radius:12px; border:none; font-weight:bold;">Save Catch</button>
        </div>

        <div class="pg" id="pg-wx">
            <div class="sec">
                <div class="stitle">
                    Weather 
                    <span id="wx-sync-status" class="sync-indicator status-cached">Cached</span>
                </div>
                <div id="wx-display" style="text-align:center; padding:20px;">
                    <h2 id="temp-val">--°C</h2>
                    <p id="desc-val">Loading data...</p>
                </div>
            </div>
        </div>
    </div>

    <nav class="tabs">
        <div class="tab active" onclick="go('log')"><span class="ti">📝</span><span class="tl">Log</span></div>
        <div class="tab" onclick="go('wx')"><span class="ti">⛅</span><span class="tl">Weather</span></div>
        <div class="tab" onclick="go('map')"><span class="ti">📍</span><span class="tl">Map</span></div>
        <div class="tab" onclick="go('list')"><span class="ti">🏆</span><span class="tl">Catches</span></div>
    </nav>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // 1. HYBRID SYNC STRATEGY (The Core Brief Change)
    async function hybridFetchWeather() {
        const key = 'last_weather';
        const display = document.getElementById('wx-display');
        const status = document.getElementById('wx-sync-status');

        // Step 1: Immediate Load from Cache
        const cached = localStorage.getItem(key);
        if (cached) {
            updateWeatherUI(JSON.parse(cached));
            status.innerText = "Cached";
            status.className = "sync-indicator status-cached";
        }

        // Step 2: Background Fetch (Live Sync)
        try {
            // Simulated API call (No-API constraint placeholder)
            const freshData = { temp: 22, desc: "Clear Skies", time: Date.now() }; 
            
            // Step 3: Compare and Update
            setTimeout(() => { // Simulate network delay
                localStorage.setItem(key, JSON.stringify(freshData));
                updateWeatherUI(freshData);
                status.innerText = "Live Update";
                status.className = "sync-indicator status-live";
            }, 1500);
        } catch (e) {
            console.log("Offline mode: using cache.");
        }
    }

    function updateWeatherUI(data) {
        document.getElementById('temp-val').innerText = data.temp + "°C";
        document.getElementById('desc-val').innerText = data.desc;
    }

    // 2. RESTORED MAP FUNCTIONALITY
    let logMap, logPin;
    function initMap() {
        logMap = L.map('logmap').setView([-37.6878, 176.1651], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(logMap);
        logPin = L.marker([-37.6878, 176.1651], {draggable: true}).addTo(logMap);
        
        logPin.on('dragend', function(e) {
            const pos = logPin.getLatLng();
            document.getElementById('clat').value = pos.lat.toFixed(4);
            document.getElementById('clng').value = pos.lng.toFixed(4);
        });
    }

    function doGPS() {
        navigator.geolocation.getCurrentPosition(p => {
            const {latitude, longitude} = p.coords;
            document.getElementById('clat').value = latitude.toFixed(4);
            document.getElementById('clng').value = longitude.toFixed(4);
            const newPos = [latitude, longitude];
            logMap.setView(newPos, 15);
            logPin.setLatLng(newPos);
        });
    }

    // 3. NAVIGATION
    function go(id) {
        document.querySelectorAll('.pg').forEach(p => p.classList.remove('show'));
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('pg-' + id).classList.add('show');
        event.currentTarget.classList.add('active');
        
        if(id === 'wx') hybridFetchWeather();
    }

    // Initialize
    window.onload = () => {
        initMap();
        hybridFetchWeather();
    };
</script>
</body>
</html>
