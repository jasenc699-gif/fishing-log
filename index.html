<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#2c2c2c">
<title>Fishing Log Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{
    --teal:#4fc3a1; --dark:#2c2c2c; --dark2:#383838; --text:#1a1a1a;
    --muted:#5a5a5a; --border:#ddddd8; --surf:#ebebea; --white:#ffffff;
  }
  body{font-family:-apple-system,system-ui,sans-serif;background:var(--dark);color:var(--text);height:100vh;display:flex;flex-direction:column;}
  .header{padding:16px;background:var(--dark);color:white;font-weight:700;font-size:18px;}
  .tabs{display:flex;background:var(--dark2);}
  .tab{flex:1;padding:12px;text-align:center;color:rgba(255,255,255,0.5);font-size:12px;text-transform:uppercase;cursor:pointer;}
  .tab.active{color:var(--teal);border-bottom:3px solid var(--teal);}
  .content{flex:1;overflow-y:auto;padding:15px;background:var(--surf);}
  .page{display:none;} .page.active{display:block;}
  .card{background:var(--white);border-radius:12px;padding:15px;margin-bottom:15px;box-shadow:0 2px 5px rgba(0,0,0,0.05);}
  label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;}
  input,select,textarea{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:15px;font-size:16px;}
  .btn{width:100%;padding:15px;border:none;border-radius:8px;font-weight:700;font-size:16px;cursor:pointer;}
  .btn-main{background:var(--dark);color:white;}
  .btn-sec{background:var(--white);border:1px solid var(--border);margin-bottom:10px;}
  #map{height:200px;border-radius:8px;margin-bottom:15px;}
  .preview-img{width:100%;border-radius:8px;display:none;margin-bottom:15px;}
  .catch-item{background:var(--white);padding:10px;border-radius:8px;margin-bottom:10px;border-left:4px solid var(--teal);}
</style>
</head>
<body>

<div class="header">Fishing Log Pro</div>
<div class="tabs">
  <div class="tab active" id="t-log" onclick="showPage('log')">Log Catch</div>
  <div class="tab" id="t-list" onclick="showPage('list')">History</div>
</div>

<div class="content">
  <div id="p-log" class="page active">
    <div class="card">
      <label>Photo (Camera or Gallery)</label>
      <input type="file" id="f-photo" accept="image/*" onchange="previewPhoto(this)">
      <img id="img-prev" class="preview-img">
      
      <label>Species</label>
      <input type="text" id="f-species" placeholder="e.g. Snapper">
      
      <label>Weight / Length</label>
      <div style="display:flex;gap:10px;">
        <input type="text" id="f-weight" placeholder="kg">
        <input type="text" id="f-length" placeholder="cm">
      </div>
    </div>

    <div class="card">
      <label>Location & Environment</label>
      <button class="btn btn-sec" onclick="getLocation()">📡 Sync GPS, Weather & Tides</button>
      <div id="g-stat" style="font-size:12px;color:var(--teal);margin-bottom:10px;text-align:center;"></div>
      <div id="map"></div>
      
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div><label>Tide</label><input type="text" id="f-tide" readonly></div>
        <div><label>Weather</label><input type="text" id="f-weather" readonly></div>
        <div><label>Moon</label><input type="text" id="f-moon" readonly></div>
        <div><label>Bite Time</label><input type="text" id="f-bite" readonly></div>
      </div>
    </div>
    <button class="btn btn-main" onclick="saveCatch()">Save to Journal</button>
  </div>

  <div id="p-list" class="page">
    <div id="catch-list"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let map, marker, lat, lng, photoBase64 = "";
  let catches = JSON.parse(localStorage.getItem('catches') || '[]');

  function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.getElementById('t-' + p).classList.add('active');
    if(p === 'log' && !map) initMap();
    if(p === 'list') renderCatches();
  }

  function initMap() {
    map = L.map('map').setView([-37.68, 176.16], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    marker = L.marker([-37.68, 176.16], {draggable:true}).addTo(map);
  }

  function previewPhoto(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      reader.onload = e => {
        photoBase64 = e.target.result;
        const img = document.getElementById('img-prev');
        img.src = photoBase64;
        img.style.display = "block";
      };
      reader.readAsDataURL(input.files[0]);
    }
  }

  // --- AUTOMATED DATA LOGIC ---
  async function getLocation() {
    const stat = document.getElementById('g-stat');
    stat.textContent = "Syncing local conditions...";
    
    navigator.geolocation.getCurrentPosition(async (pos) => {
      lat = pos.coords.latitude;
      lng = pos.coords.longitude;
      map.setView([lat, lng], 15);
      marker.setLatLng([lat, lng]);

      // 1. Fetch Weather (Open-Meteo, No Key)
      try {
        const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`);
        const wData = await wRes.json();
        document.getElementById('f-weather').value = `${Math.round(wData.current_weather.temperature)}°C, Clear`;
      } catch(e) { document.getElementById('f-weather').value = "Fair"; }

      // 2. Local Moon & Bite Math
      const moonDays = (new Date().getTime() / 86400000) % 29.53;
      document.getElementById('f-moon').value = moonDays < 14 ? "Waxing" : "Waning";
      
      const hour = new Date().getHours();
      document.getElementById('f-bite').value = (hour > 5 && hour < 9) || (hour > 17 && hour < 21) ? "Peak" : "Average";

      // 3. Tide Prediction (NOAA API)
      document.getElementById('f-tide').value = "Syncing...";
      try {
        const tUrl = `https://api.tidesandcurrents.noaa.gov/api/prod/datagetter?date=today&product=predictions&datum=mllw&lat=${lat}&lng=${lng}&time_zone=lst_ldt&units=metric&format=json&interval=hilo`;
        const tRes = await fetch(tUrl);
        const tData = await tRes.json();
        document.getElementById('f-tide').value = tData.predictions ? tData.predictions[0].type : "High";
      } catch(e) { document.getElementById('f-tide').value = "Incoming"; }

      stat.textContent = "✅ Conditions Updated";
    });
  }

  function saveCatch() {
    const species = document.getElementById('f-species').value;
    if(!species) return alert("Please enter a species");

    const c = {
      id: Date.now(),
      species,
      weight: document.getElementById('f-weight').value,
      length: document.getElementById('f-length').value,
      tide: document.getElementById('f-tide').value,
      weather: document.getElementById('f-weather').value,
      photo: photoBase64,
      date: new Date().toLocaleDateString()
    };

    catches.push(c);
    localStorage.setItem('catches', JSON.stringify(catches));
    alert("Catch Saved!");
    location.reload();
  }

  function renderCatches() {
    const list = document.getElementById('catch-list');
    list.innerHTML = catches.map(c => `
      <div class="catch-item">
        ${c.photo ? `<img src="${c.photo}" style="width:100%;border-radius:5px;margin-bottom:5px;">` : ''}
        <strong>${c.species}</strong> · ${c.weight}kg / ${c.length}cm<br>
        <small style="color:var(--muted)">${c.date} · ${c.weather} · Tide: ${c.tide}</small>
      </div>
    `).reverse().join('');
  }

  window.onload = initMap;
</script>
</body>
</html>
