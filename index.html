<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Fishing Log Pro</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
    :root { --primary: #4fc3a1; --bg: #f4f4f2; --card: #ffffff; --text: #333; --accent: #3498db; --danger: #e74c3c; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
    body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 20px; color: var(--text); overflow-x: hidden; }
    
    .header { background: #2c2c2c; color: white; padding: 15px; text-align: center; font-weight: bold; letter-spacing: 1px; }
    .nav { display: flex; background: #383838; overflow-x: auto; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #444; }
    .nav-btn { flex: 1; padding: 12px 15px; color: #999; border: none; background: none; font-size: 10px; text-transform: uppercase; cursor: pointer; min-width: 70px; }
    .nav-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

    .section { display: none; padding: 15px; animation: fadeIn 0.1s; }
    .section.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .card { background: var(--card); border-radius: 12px; padding: 20px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
    label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 8px; color: #888; text-transform: uppercase; text-align: left; }
    input, select, textarea { width: 100%; padding: 14px; margin-bottom: 15px; border: 1px solid #eee; border-radius: 8px; font-size: 16px; background: #fdfdfd; -webkit-appearance: none; }
    
    .search-row { display: flex; gap: 8px; margin-bottom: 15px; }
    .search-row input { margin-bottom: 0; flex: 2; }
    .btn-geo { background: #555; color: white; border: none; padding: 0 12px; border-radius: 8px; cursor: pointer; font-size: 18px; }

    #map { height: 260px; border-radius: 12px; width: 100%; border: 1px solid #ddd; margin-bottom: 15px; z-index: 1; }
    
    .pill-box { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; text-align: left; }
    .pill { background: #eee; padding: 8px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; border: 1px solid #ddd; color: #444; }
    .pill:active { background: var(--primary); color: white; border-color: var(--primary); }

    .catch-card { background: white; margin-bottom: 15px; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); border: 1px solid #eee; text-align: left; position: relative; }
    .delete-btn { position: absolute; top: 10px; right: 10px; background: var(--danger); color: white; border: none; border-radius: 8px; padding: 5px 10px; font-size: 10px; font-weight: bold; cursor: pointer; z-index: 10; opacity: 0.9; }

    .badge-row { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
    .badge { padding: 4px 8px; border-radius: 5px; font-size: 10px; font-weight: bold; color: white; }
    .bg-tide { background: var(--accent); }
    .bg-weather { background: #f39c12; }
    .bg-time { background: #7f8c8d; }
    
    .note-text { font-size: 13px; color: #555; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-top: 12px; line-height: 1.4; border-left: 3px solid var(--primary); }
</style>
</head>
<body>

<div class="header">FISHING LOG PRO</div>

<div class="nav">
    <button class="nav-btn active" onclick="showTab('log', this)">Log</button>
    <button class="nav-btn" onclick="showTab('map-tab', this)">Map</button>
    <button class="nav-btn" onclick="showTab('catches', this)">Catches</button>
    <button class="nav-btn" onclick="showTab('stats', this)">Stats</button>
</div>

<div id="log" class="section active">
    <div class="card">
        <label>📍 Spot Location</label>
        <div class="search-row">
            <input type="text" id="map-search" placeholder="Search spot...">
            <button class="btn-geo" onclick="searchLocation()">🔍</button>
            <button class="btn-geo" onclick="useMyLocation()">📍</button>
        </div>
        <div id="map"></div>
        <input type="text" id="f-loc-name" placeholder="Name of Spot">

        <label>📅 Date & Time</label>
        <input type="datetime-local" id="f-datetime">
        
        <label>📸 Photo</label>
        <input type="file" id="f-photo" accept="image/*" capture="environment">
        <img id="img-prev-el" style="width:100%; display:none; border-radius:8px; margin-bottom:15px;">

        <label>Species</label>
        <select id="f-species" onchange="toggleCustomSpecies(this.value)">
            <option>Snapper</option><option>Kingfish</option><option>Trout (Rainbow)</option>
            <option>Trout (Brown)</option><option>Kahawai</option><option value="CUSTOM">-- Custom --</option>
        </select>
        <div id="custom-species-wrap" style="display:none;">
            <input type="text" id="f-custom-species" placeholder="Enter species">
            <div id="species-library" class="pill-box"></div>
        </div>

        <label>Fly / Lure</label>
        <input type="text" id="f-fly" placeholder="Fly Name">
        <div id="fly-library" class="pill-box"></div>

        <label>Weight (kg)</label>
        <input type="number" id="f-weight" step="0.1" placeholder="0.0">

        <label>📝 Catch Notes</label>
        <textarea id="f-notes" placeholder="Notes..."></textarea>
        <div id="quick-notes" class="pill-box"></div>
        
        <span id="live-tide" style="display:none">--</span>
        <span id="live-weather" style="display:none">--</span>

        <button style="background:var(--primary); color:white; border:none; width:100%; padding:18px; border-radius:10px; font-weight:bold; font-size:16px;" onclick="saveCatch()">SAVE CATCH</button>
    </div>
</div>

<div id="map-tab" class="section"><div class="card"><div id="big-map" style="height:400px; border-radius:12px;"></div></div></div>
<div id="catches" class="section"><div id="catch-list"></div></div>
<div id="stats" class="section">
    <div class="card"><label>🏆 Leaderboard</label><div id="leaderboard"></div></div>
    <div class="card"><label>💾 Data</label><button onclick="exportData()" style="width:100%; padding:12px; background:#555; color:white; border:none; border-radius:8px;">Export JSON</button></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map, bigMap, marker, lat, lng, photoBase64 = "";
    let catches = JSON.parse(localStorage.getItem('catches') || '[]');
    let flyBox = JSON.parse(localStorage.getItem('flyBox') || '["Clouser", "Hare & Copper", "Woolly Bugger", "Parachute Adams"]');
    let speciesBox = JSON.parse(localStorage.getItem('speciesBox') || '[]');
    let quickNotePhrases = ["Released", "Strong Fight", "Clear Water", "Murky Water", "Top Water", "Deep Water", "Personal Best", "Sight Fished"];

    function vibrate(ms = 25) { if (navigator.vibrate) navigator.vibrate(ms); }

    function showTab(id, btn) {
        vibrate(20);
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
        if(id === 'log' && map) setTimeout(() => map.invalidateSize(), 100);
        if(id === 'catches') renderCatches();
    }

    function addQuickNote(phrase) {
        vibrate(15);
        const area = document.getElementById('f-notes');
        const current = area.value.trim();
        area.value = current ? current + ", " + phrase : phrase;
    }

    async function useMyLocation() {
        vibrate(30);
        navigator.geolocation.getCurrentPosition(p => {
            const myLat = p.coords.latitude, myLng = p.coords.longitude;
            map.setView([myLat, myLng], 15);
            marker.setLatLng([myLat, myLng]);
            syncConditions(myLat, myLng);
        });
    }

    async function searchLocation() {
        const query = document.getElementById('map-search').value;
        if(!query) return;
        const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`).then(r => r.json());
        if(res.length > 0) {
            const pos = [res[0].lat, res[0].lon];
            map.setView(pos, 14);
            marker.setLatLng(pos);
            syncConditions(res[0].lat, res[0].lon);
        }
    }

    async function syncConditions(newLat, newLng) {
        lat = newLat; lng = newLng;
        try {
            const w = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current_weather=true`).then(r => r.json());
            document.getElementById('live-weather').innerText = Math.round(w.current_weather.temperature) + "°C";
            const hr = new Date().getHours();
            document.getElementById('live-tide').innerText = (hr % 12 < 6) ? "Incoming" : "Outgoing";
        } catch(e) {}
    }

    function saveCatch() {
        vibrate([40, 60, 40]);
        let spec = document.getElementById('f-species').value;
        if(spec === 'CUSTOM') spec = document.getElementById('f-custom-species').value || 'Unknown';
        
        const dt = new Date(document.getElementById('f-datetime').value);
        const entry = {
            id: Date.now(), 
            species: spec, 
            weight: parseFloat(document.getElementById('f-weight').value) || 0,
            fly: document.getElementById('f-fly').value, 
            notes: document.getElementById('f-notes').value,
            locName: document.getElementById('f-loc-name').value || "Spot",
            lat: lat, lng: lng, 
            photo: photoBase64,
            date: dt.toLocaleDateString('en-NZ', { day:'numeric', month:'short' }),
            time: dt.toLocaleTimeString('en-NZ', { hour:'2-digit', minute:'2-digit' }),
            weather: document.getElementById('live-weather').innerText,
            tide: document.getElementById('live-tide').innerText
        };
        
        catches.push(entry);
        localStorage.setItem('catches', JSON.stringify(catches));
        location.reload();
    }

    function renderCatches() {
        document.getElementById('catch-list').innerHTML = catches.map(c => `
            <div class="catch-card">
                <button class="delete-btn" onclick="deleteCatch(${c.id})">DELETE</button>
                ${c.photo ? `<img src="${c.photo}" style="width:100%">` : ''}
                <div style="padding:15px;">
                    <div style="display:flex; justify-content:space-between;">
                        <strong>${c.species}</strong>
                        <strong style="color:var(--primary)">${c.weight}kg</strong>
                    </div>
                    <div class="badge-row">
                        <span class="badge bg-time">📅 ${c.date} ${c.time}</span>
                        <span class="badge bg-weather">🌡️ ${c.weather}</span>
                        <span class="badge bg-tide">🌊 ${c.tide}</span>
                    </div>
                    ${c.notes ? `<div class="note-text">${c.notes}</div>` : ''}
                    <div style="font-size:11px; color:#999; margin-top:10px;">📍 ${c.locName} ${c.fly ? '| 🎣 ' + c.fly : ''}</div>
                </div>
            </div>
        `).reverse().join('') || '<div class="card">No catches yet!</div>';
    }

    function deleteCatch(id) {
        vibrate(50);
        if(confirm("Permanently delete catch?")) {
            catches = catches.filter(c => c.id !== id);
            localStorage.setItem('catches', JSON.stringify(catches));
            renderCatches();
        }
    }

    window.onload = () => {
        const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('f-datetime').value = now.toISOString().slice(0,16);

        map = L.map('map').setView([-37.68, 176.16], 12);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        marker = L.marker([-37.68, 176.16], {draggable: true}).addTo(map);
        marker.on('dragend', () => syncConditions(marker.getLatLng().lat, marker.getLatLng().lng));

        navigator.geolocation.getCurrentPosition(p => {
            const lat = p.coords.latitude, lng = p.coords.longitude;
            map.setView([lat, lng], 14); marker.setLatLng([lat, lng]);
            syncConditions(lat, lng);
        });

        document.getElementById('fly-library').innerHTML = flyBox.map(f => `<span class="pill" onclick="document.getElementById('f-fly').value='${f}'; vibrate(10);">${f}</span>`).join('');
        document.getElementById('quick-notes').innerHTML = quickNotePhrases.map(p => `<span class="pill" onclick="addQuickNote('${p}')">${p}</span>`).join('');
        renderCatches();
    };

    function toggleCustomSpecies(val) { document.getElementById('custom-species-wrap').style.display = (val === 'CUSTOM') ? 'block' : 'none'; }
    function exportData() {
        const blob = new Blob([JSON.stringify(catches)], {type: 'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
        a.download = 'fishing_backup.json'; a.click();
    }
</script>
</body>
</html>
